<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420" fill="none">
  <!-- Shadow -->
  <ellipse cx="140" cy="400" rx="60" ry="12" fill="rgba(0,0,0,0.3)"/>

  <!-- Body segments -->
  <ellipse cx="140" cy="310" rx="52" ry="65" fill="#E8A87C"/>
  <ellipse cx="140" cy="230" rx="48" ry="58" fill="#F0B88E"/>
  <ellipse cx="140" cy="155" rx="44" ry="52" fill="#F5C49A"/>
  <ellipse cx="140" cy="90"  rx="40" ry="48" fill="#F8CEAA"/>

  <!-- Body shading -->
  <ellipse cx="125" cy="280" rx="8" ry="30" fill="rgba(0,0,0,0.06)"/>
  <ellipse cx="125" cy="200" rx="7" ry="25" fill="rgba(0,0,0,0.05)"/>
  <ellipse cx="125" cy="130" rx="6" ry="20" fill="rgba(0,0,0,0.04)"/>

  <!-- Left arm -->
  <path d="M95 240 Q60 200 55 160 Q50 130 70 125 Q85 122 95 145" fill="#F0B88E" stroke="#D4956A" stroke-width="1.5"/>
  <!-- Right arm -->
  <path d="M185 240 Q220 200 225 160 Q230 130 210 125 Q195 122 185 145" fill="#F0B88E" stroke="#D4956A" stroke-width="1.5"/>

  <!-- Left hand -->
  <circle cx="68" cy="128" r="10" fill="#F0B88E" stroke="#D4956A" stroke-width="1.5"/>
  <!-- Right hand -->
  <circle cx="212" cy="128" r="10" fill="#F0B88E" stroke="#D4956A" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="140" cy="72" rx="42" ry="46" fill="#F8CEAA"/>

  <!-- Eyes -->
  <ellipse cx="122" cy="68" rx="14" ry="16" fill="white"/>
  <ellipse cx="158" cy="68" rx="14" ry="16" fill="white"/>
  <circle cx="124" cy="70" r="8" fill="#1a1d23"/>
  <circle cx="160" cy="70" r="8" fill="#1a1d23"/>
  <circle cx="126" cy="67" r="3" fill="white"/>
  <circle cx="162" cy="67" r="3" fill="white"/>

  <!-- Eyebrows (excited) -->
  <path d="M110 54 Q122 48 134 54" stroke="#C97B5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M146 54 Q158 48 170 54" stroke="#C97B5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mouth open -->
  <ellipse cx="140" cy="92" rx="12" ry="10" fill="#1a1d23"/>
  <ellipse cx="140" cy="88" rx="8" ry="4" fill="#FF6B6B" opacity="0.3"/>

  <!-- Tongue -->
  <path d="M134 96 Q140 108 146 96 Q140 100 134 96" fill="#E85D5D"/>

  <!-- Cheeks blush -->
  <ellipse cx="108" cy="82" rx="8" ry="5" fill="#FF9999" opacity="0.35"/>
  <ellipse cx="172" cy="82" rx="8" ry="5" fill="#FF9999" opacity="0.35"/>

  <!-- Small feet -->
  <ellipse cx="115" cy="370" rx="14" ry="8" fill="#E8A87C" stroke="#D4956A" stroke-width="1"/>
  <ellipse cx="165" cy="370" rx="14" ry="8" fill="#E8A87C" stroke="#D4956A" stroke-width="1"/>
</svg>
