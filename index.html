<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROWDY</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/effects.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="page">
    <header class="header">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="GROWDY" class="logo-icon" />
        GROWDY
      </a>
      <nav class="nav">
        <a href="how-to-play.html">Gameplay</a>
        <a href="tokenomics.html">Token</a>
        <a href="roadmap.html">Roadmap</a>
        <a href="faq.html">FAQ</a>
        <a href="about.html" class="nav-wiki">Guide</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-badge" id="burnerWallet" type="button">
          <span class="wallet-dot"></span>
          <span class="wallet-address">...</span>
        </button>
        <a href="game.html" class="btn-play-nav"><span>Play Now</span></a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <main class="hero-landing">
      <div class="hero-stage">
        <video class="hero-mascot" autoplay loop muted playsinline aria-label="Growdy mascot">
          <source src="assets/mascot.webm" type="video/webm" />
          <source src="assets/video.mp4" type="video/mp4" />
        </video>
        <img src="assets/background.png" alt="" class="hero-bg-logo" width="1500" height="500" aria-hidden="true" />
      </div>
      <p class="subheadline">
        idle game on Solana. Grow yours, earn dickoin, and convert to $GROWDY - Size matter on Blockchain.
      </p>
      <div class="cta-row">
        <a href="game.html" class="btn-cta-primary">Play Free Now</a>
        <a href="tokenomics.html" class="btn-cta-secondary">$GROWDY Token</a>
      </div>
    </main>

    <footer class="site-footer">
      <div class="social-row">
        <a href="https://x.com/PlayGrowdy" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="X / Twitter">
          <img src="assets/icons/x.png" alt="" width="24" height="24" />
        </a>
        <a href="https://pump.fun" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Pump.fun">
          <img src="assets/icons/pf.png" alt="" width="24" height="24" />
        </a>
        <a href="https://dexscreener.com" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Dexscreener">
          <img src="assets/icons/dx.png" alt="" width="24" height="24" />
        </a>
      </div>
      <p class="footer-copy">© 2026 GROWDY — Not financial advice. Just vibes.</p>
    </footer>
  </div>

  <a href="faq.html" class="help-btn" aria-label="Help">?</a>

  <div class="music-player" id="musicPlayer">
    <button type="button" class="music-player-toggle" id="musicToggle" aria-label="Music" aria-expanded="false" aria-controls="musicPanel">
      <span class="music-player-icon" aria-hidden="true">🎵</span>
    </button>
    <div class="music-player-panel" id="musicPanel" hidden>
      <p class="music-player-track" id="musicTrack">Goofy 1</p>
      <div class="music-player-controls">
        <button type="button" class="music-player-btn" id="musicPlay" aria-label="Play">▶</button>
        <button type="button" class="music-player-btn" id="musicPause" aria-label="Pause">⏸</button>
        <button type="button" class="music-player-btn" id="musicNext" aria-label="Next track">⏭</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
